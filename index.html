<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordens Ark – Casual Horde Guild</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #0c0f14;
  --card-bg: #141922;
  --horde-red: #a30000;
  --fel-green: #00ff9d;
  --text-soft: #cfd6e4;
}
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1f2b 0%, #0c0f14 60%);
  color: var(--text-soft);
}
header { text-align:center; padding:90px 20px 60px; background: linear-gradient(to bottom, rgba(163,0,0,0.3), transparent);}
header h1 { font-family:'Cinzel', serif; font-size:58px; color:white; margin:0; }
header p { margin-top:10px; font-size:18px; color:var(--fel-green); }

nav { text-align:center; padding:15px; }
nav a, nav button { color:white; margin:0 12px; text-decoration:none; font-weight:600; background:none; border:none; cursor:pointer; opacity:0.8; }
nav a:hover, nav button:hover { opacity:1; color:var(--fel-green); }

section { max-width:1050px; margin:auto; padding:50px 20px; }
h2 { font-family:'Cinzel', serif; font-size:30px; border-left:4px solid var(--horde-red); padding-left:12px; color:white; margin-bottom:25px; }

.card {
  background:var(--card-bg);
  padding:28px;
  border-radius:10px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
  line-height:1.65;
}

.progress-bar {
  background:#1f2633;
  border-radius:30px;
  overflow:hidden;
  height:24px;
  margin:8px 0;
}
.progress-fill {
  height:100%;
  background:linear-gradient(to right,var(--horde-red),var(--fel-green));
  text-align:right;
  padding-right:10px;
  font-size:13px;
  color:white;
  font-weight:600;
  width:0;
  animation: fillBar 1.5s ease forwards;
}
@keyframes fillBar {
  from { width: 0%; }
  to { width: var(--fill-percent); }
}

.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; }

button { background:var(--horde-red); border:none; padding:10px 16px; color:white; border-radius:5px; font-weight:bold; cursor:pointer;}
button:hover { background:#800000; }

footer { text-align:center; padding:30px; font-size:14px; opacity:0.6; }

/* Admin modal */
#adminModal {
  display:none;
  position:fixed;
  top:0; left:0; width:100vw; height:100vh;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
#adminModal .modal-content {
  background:var(--card-bg);
  padding:30px; border-radius:8px; width:350px;
}
#adminModal input, #adminModal textarea {
  width:100%; padding:8px; margin:8px 0; border-radius:4px; border:none;
}
</style>
</head>

<body>

<header>
  <h1>Nordens Ark</h1>
  <p id="aboutText">Avslappnad Horde‑guild – vi spelar för att ha kul!</p>
</header>

<nav>
  <a href="#about">Om Oss</a>
  <a href="#progress">Progress</a>
  <a href="#gallery">Galleri</a>
  <a href="#recruitment">Rekrytering</a>
  <button onclick="showAdmin()">Admin</button>
</nav>

<section id="about">
  <h2>Om Oss</h2>
  <div class="card">
    <p id="aboutContent"></p>
  </div>
</section>

<section id="progress">
  <h2>Raid Progress</h2>
  <div class="card" id="progressContainer"><p>Uppdatera progress i admin!</p></div>
</section>

<section id="gallery">
  <h2>Raid Galleri</h2>
  <div class="card">

    <div style="margin-bottom:15px;">
      <input type="file" id="galleryUpload" accept="image/*">
      <button onclick="uploadImage()">Ladda upp bild</button>
    </div>

    <div class="gallery" id="galleryContainer"></div>
  </div>
</section>

<section id="recruitment">
  <h2>Rekrytering</h2>
  <div class="card">
    <p>Spela med oss! Alla klasser och nivåer är välkomna.</p>
    <div style="text-align:center; margin-top:20px;">
      <button id="discordBtn">Ansök via Discord</button>
    </div>
  </div>
</section>

<footer>© 2026 Nordens Ark</footer>

<!-- Admin Modal -->
<div id="adminModal">
  <div class="modal-content">
    <h3>Admin Panel</h3>

    <label>Admin‑lösenord:</label>
    <input type="password" id="adminPassInput" placeholder="Admin‑lösenord">

    <label>Discord‑länk:</label>
    <input type="text" id="adminDiscordURL" placeholder="https://discord.gg/...">

    <label>Om Oss‑text:</label>
    <textarea id="adminAboutText" rows="3"></textarea>

    <h4>Raid Progress</h4>
    <div id="adminProgressInputs"></div>

    <button onclick="saveAdminData()">Spara allt</button>
    <button onclick="hideAdmin()">Avsluta</button>
  </div>
</div>

<script>
// --- localStorage helpers ---
// Läs JSON från localStorage, eller fallback
function loadJSON(key, fallback) {
  const raw = localStorage.getItem(key);
  return raw ? JSON.parse(raw) : fallback;
}

// --- Data i localStorage ---
let progressData = loadJSON("guildProgress", {
  "Karazhan": { kills:0, total:0 },
  "Gruul": { kills:0, total:0 },
  "SSC": { kills:0, total:0 },
  "TK": { kills:0, total:0 }
});
let galleryImages = loadJSON("galleryImages", []);
let discordLink = localStorage.getItem("discordLink") || "";
let aboutText = localStorage.getItem("aboutText") || "";

// --- Update displays ---
function renderProgress() {
  let html = "";
  for (let r in progressData) {
    const {kills, total} = progressData[r];
    const pct = total > 0 ? Math.round((kills/total)*100): 0;
    html += `
      <div><b>${r}</b></div>
      <div class="progress-bar">
        <div class="progress-fill" style="--fill-percent:${pct}%;">${kills}/${total}</div>
      </div>`;
  }
  document.getElementById("progressContainer").innerHTML = html;
}

function renderGallery(isAdmin=false) {
  let html = "";
  galleryImages.forEach((imgData, idx) => {
    html += `
      <div style="position:relative;">
        <img src="${imgData}" style="width:100%; border-radius:6px;">
        ${(isAdmin ? `<button onclick="removeImage(${idx})"
          style="position:absolute; top:-6px; right:-6px; background:red; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer;">✕</button>` : ``)}
      </div>`;
  });
  document.getElementById("galleryContainer").innerHTML = html;
}

function updateDiscordBtn() {
  if(discordLink) {
    document.getElementById("discordBtn").onclick = ()=>window.open(discordLink,"_blank");
  }
}

function renderAbout() {
  document.getElementById("aboutContent").textContent = aboutText;
}

// --- Run initial renders ---
renderProgress();
renderGallery();
updateDiscordBtn();
renderAbout();

// --- Gallery upload & delete ---
function uploadImage(){
  const f=document.getElementById("galleryUpload").files[0];
  if(!f) return alert("Välj en bild!");
  const r=new FileReader();
  r.onload=()=> {
    galleryImages.push(r.result); // Bilden i base64
    localStorage.setItem("galleryImages",JSON.stringify(galleryImages));
    renderGallery(adminLoggedIn);
  }
  r.readAsDataURL(f);
}

function removeImage(i){
  if(confirm("Ta bort bilden?")){
    galleryImages.splice(i,1);
    localStorage.setItem("galleryImages",JSON.stringify(galleryImages));
    renderGallery(adminLoggedIn);
  }
}

// --- Admin ---
let adminLoggedIn = false;
const ADMIN_PASSWORD = "letmein"; // ändra detta!

function showAdmin(){
  document.getElementById("adminModal").style.display="flex";
  document.getElementById("adminDiscordURL").value=discordLink;
  document.getElementById("adminAboutText").value=aboutText;
  const inputs=document.getElementById("adminProgressInputs");
  inputs.innerHTML="";
  for(let r in progressData) {
    inputs.innerHTML+=`
      <div>${r}:
      <input type="number" id="input_${r}_kills" value="${progressData[r].kills}" placeholder="kills">
      /
      <input type="number" id="input_${r}_total" value="${progressData[r].total}" placeholder="total">
      </div>`;
  }
}

function hideAdmin(){
  document.getElementById("adminModal").style.display="none";
}

function saveAdminData(){
  const pass=document.getElementById("adminPassInput").value;
  if(pass!==ADMIN_PASSWORD) return alert("Fel lösenord!");
  // Markera admin som inloggad
  adminLoggedIn=true;
  
  // Discord
  discordLink=document.getElementById("adminDiscordURL").value;
  localStorage.setItem("discordLink",discordLink);
  updateDiscordBtn();

  // Om oss text
  aboutText=document.getElementById("adminAboutText").value;
  localStorage.setItem("aboutText",aboutText);
  renderAbout();

  // Progress
  for(let r in progressData){
    const k=parseInt(document.getElementById(`input_${r}_kills`).value)||0;
    const t=parseInt(document.getElementById(`input_${r}_total`).value)||0;
    progressData[r]={kills:k,total:t};
  }
  localStorage.setItem("guildProgress",JSON.stringify(progressData));
  renderProgress();

  // Update gallery with admin delete buttons
  renderGallery(adminLoggedIn);

  hideAdmin();
}
</script>

</body>
</html>
