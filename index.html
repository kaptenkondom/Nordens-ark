<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordens Ark – Horde Casual Guild</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #0c0f14;
  --card-bg: #141922;
  --horde-red: #a30000;
  --fel-green: #00ff9d;
  --text-soft: #cfd6e4;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1f2b 0%, #0c0f14 60%);
  color: var(--text-soft);
}

header {
  text-align: center;
  padding: 100px 20px 80px 20px;
  background: linear-gradient(to bottom, rgba(163,0,0,0.3), transparent);
}

header h1 {
  font-family: 'Cinzel', serif;
  font-size: 64px;
  margin: 0;
  color: white;
  letter-spacing: 2px;
}

header p {
  margin-top: 15px;
  font-size: 20px;
  color: var(--fel-green);
}

nav {
  text-align: center;
  padding: 20px;
}

nav a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: 600;
  opacity: 0.8;
  transition: 0.3s;
}

nav a:hover {
  opacity: 1;
  color: var(--fel-green);
}

section {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

h2 {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  margin-bottom: 30px;
  color: white;
  border-left: 4px solid var(--horde-red);
  padding-left: 15px;
}

.card {
  background: var(--card-bg);
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  line-height: 1.7;
}

.card p {
  font-size: 17px;
}

/* Progress bars */

.progress-item {
  margin-bottom: 25px;
}

.progress-title {
  font-weight: 600;
  margin-bottom: 8px;
}

.progress-bar {
  background: #1f2633;
  border-radius: 30px;
  overflow: hidden;
  height: 22px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--horde-red), var(--fel-green));
  text-align: right;
  padding-right: 10px;
  font-size: 12px;
  line-height: 22px;
  font-weight: bold;
}

/* Gallery */

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.03);
}

/* Recruitment */

<section id="recruitment">
<h2>Rekrytering</h2>
<div class="card">

<p>
Vi är <b>Nordens Ark</b> – en avslappnad Horde-guild som spelar World of Warcraft för att det är roligt.  
Vi bryr oss inte om parses eller meta, bara om spelare som gillar gemenskap!
</p>

<p>
Alla klasser, alla specs och alla nivåer är välkomna. Om du gillar Horde och vill ha kul, kom och spela med oss!
</p>

<p>
Hos oss är det helt okej att:
<br>– AFK:a för verkliga livet
<br>– Skratta åt wipes
<br>– Spela i din egen takt
</p>

<p>
Vi värdesätter:
<br>– Bra attityd
<br>– Humor
<br>– Gemenskap
</p>

<div style="text-align:center; margin-top:25px;">
<button onclick="window.open('https://discord.gg/YOUR_DISCORD_INVITE', '_blank')">
Ansök via Discord
</button>
</div>

<p style="margin-top:15px; font-style:italic; color:#00ff9d;">
Inga parses krävs. Bara trevligt folk och bra vibe!
</p>

</div>
</section>
<section id="gallery">
<h2>Raid Galleri</h2>
<div class="card">
<div class="gallery">
  <img src="screenshots/raid1.jpg">
  <img src="screenshots/raid2.jpg">
  <img src="screenshots/raid3.jpg">
</div>
</div>
</section>

<section id="recruitment">
<h2>Rekrytering</h2>
<div class="card">

<p>Vi söker just nu spelare som delar vår inställning:</p>

<div class="class-grid">
  <div>
    <img src="https://wow.zamimg.com/images/wow/icons/medium/classicon_shaman.jpg">
    Resto Shaman
  </div>
  <div>
    <img src="https://wow.zamimg.com/images/wow/icons/medium/classicon_priest.jpg">
    Holy / Disc Priest
  </div>
  <div>
    <img src="https://wow.zamimg.com/images/wow/icons/medium/classicon_warlock.jpg">
    Warlock
  </div>
</div>

<p style="margin-top:30px;">
Är du Horde, chill och gillar att spela för att det är kul?  
Då kommer du passa in hos oss.
</p>

</div>
</section>

<footer>
© 2026 Nordens Ark – För Horden
</footer>

</body>
</html>
